name: .NET CI

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v3

    - name: Setup .NET
      uses: actions/setup-dotnet@v3
      with:
        dotnet-version: '8.0.x'   

    - name: Restore dependencies
      run: dotnet restore Lab4.sln

    - name: Build
      run: dotnet build Lab4.sln --configuration Release --no-restore

    - name: Run tests with coverage
      run: dotnet test Lab4.sln --collect:"XPlat Code Coverage"

    - name: Install ReportGenerator
      run: dotnet tool install --global dotnet-reportgenerator-globaltool

    - name: Generate HTML coverage report
      run: |
        reportgenerator \
          -reports:Tests/TestResults/*/coverage.cobertura.xml \
          -targetdir:coveragereport \
          -reporttypes:Html

    - name: Upload coverage report
      uses: actions/upload-artifact@v4
      with:
        name: coverage-report
        path: coveragereport/
    
    - name: Install analyzers
      run: dotnet tool install --global roslynator.dotnet.cli

    - name: Lint with StyleCop
      run: dotnet build Lab4.sln -warnaserror

    - name: Analyze with Roslynator
      run: roslynator analyze Lab4.sln

