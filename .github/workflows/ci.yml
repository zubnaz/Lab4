name: .NET CI

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v3

    - name: Setup .NET
      uses: actions/setup-dotnet@v3
      with:
        dotnet-version: '8.0.x'   

    - name: Restore dependencies
      run: dotnet restore Lab4.sln

    - name: Build
      run: dotnet build Lab4.sln --configuration Release --no-restore

    - name: Run tests
      run: dotnet test Lab4.sln --verbosity normal